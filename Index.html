<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #777;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .city { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
    .temp { font-size: 2.2rem; font-weight: 300; line-height: 1.1; }
    .desc { color: #aaa; font-size: 0.88rem; margin-top: 4px; text-transform: capitalize; }
    .details { margin-top: 8px; font-size: 0.82rem; color: #666; line-height: 1.6; }
    .error { color: #c0392b; font-size: 0.85rem; margin-top: 4px; }
    #refresh {
      display: block;
      margin: 20px auto 0;
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 8px 24px;
      border-radius: 20px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    #refresh:active { background: #222; }
    #aggiornato {
      text-align: center;
      color: #444;
      font-size: 0.78rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>METEO</h1>
  <div id="cards"></div>
  <button id="refresh" onclick="caricaMeteo()">↻ Aggiorna</button>
  <div id="aggiornato"></div>

  <script>
    const API_KEY = 'b09c470f58fc66ce9ed8fd403f2b163f';

    const luoghi = [
      { nome: 'Como',             query: 'Como,IT' },
      { nome: 'Tortona',          query: 'Tortona,IT' },
      { nome: 'Savona',           query: 'Savona,IT' },
      { nome: 'Molino dei Torti', lat: 44.9167, lon: 8.8833 },
    ];

    async function fetchMeteo(luogo) {
      let url;
      if (luogo.lat !== undefined) {
        url = `https://api.openweathermap.org/data/2.5/weather?lat=${luogo.lat}&lon=${luogo.lon}&appid=${API_KEY}&units=metric&lang=it`;
      } else {
        url = `https://api.openweathermap.org/data/2.5/weather?q=${luogo.query}&appid=${API_KEY}&units=metric&lang=it`;
      }
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function icona(id) {
      if (id >= 200 && id < 300) return '⛈';
      if (id >= 300 && id < 400) return '🌦';
      if (id >= 500 && id < 600) return '🌧';
      if (id >= 600 && id < 700) return '❄️';
      if (id >= 700 && id < 800) return '🌫';
      if (id === 800)             return '☀️';
      if (id > 800)               return '☁️';
      return '🌡';
    }

    async function caricaMeteo() {
      const container = document.getElementById('cards');
      container.innerHTML = luoghi.map(l =>
        `<div class="card"><div class="city">${l.nome}</div><div class="desc">Caricamento…</div></div>`
      ).join('');

      for (let i = 0; i < luoghi.length; i++) {
        try {
          const d = await fetchMeteo(luoghi[i]);
          const id = d.weather[0].id;
          container.children[i].innerHTML = `
            <div class="city">${luoghi[i].nome} ${icona(id)}</div>
            <div class="temp">${Math.round(d.main.temp)}°C</div>
            <div class="desc">${d.weather[0].description}</div>
            <div class="details">
              Min ${Math.round(d.main.temp_min)}° · Max ${Math.round(d.main.temp_max)}°<br>
              Umidità ${d.main.humidity}% · Vento ${Math.round(d.wind.speed * 3.6)} km/h
            </div>
          `;
        } catch (e) {
          container.children[i].innerHTML = `
            <div class="city">${luoghi[i].nome}</div>
            <div class="error">Dati non disponibili</div>
          `;
        }
      }

      const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('aggiornato').textContent = `Aggiornato alle ${ora}`;
    }

    caricaMeteo();
  </script>
</body>
</html>
